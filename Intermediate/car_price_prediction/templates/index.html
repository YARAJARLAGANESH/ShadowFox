<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 22px;
            color: green;
            font-weight: bold;
        }

        .warning {
            margin-top: 10px;
            text-align: center;
            color: red;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Car Price Predictor</h1>

        <form action="/predict" method="POST">

            <input type="number"
                   step="0.1"
                   name="Present_Price"
                   placeholder="Present Price (in Lakhs)"
                   required>

            <input type="number"
                   name="Kms_Driven"
                   placeholder="Kilometers Driven"
                   required>

            <input type="number"
                   name="Owner"
                   placeholder="Number of Previous Owners"
                   required>

            <input type="number"
                   name="Year"
                   placeholder="Manufacturing Year"
                   required>

            <select name="Fuel_Type" required>
                <option value="">Select Fuel Type</option>
                <option value="Petrol">Petrol</option>
                <option value="Diesel">Diesel</option>
                <option value="CNG">CNG</option>
            </select>

            <select name="Seller_Type" required>
                <option value="">Select Seller Type</option>
                <option value="Dealer">Dealer</option>
                <option value="Individual">Individual</option>
            </select>

            <select name="Transmission" required>
                <option value="">Select Transmission</option>
                <option value="Manual">Manual</option>
                <option value="Automatic">Automatic</option>
            </select>

            <button type="submit">
                Predict Price
            </button>

        </form>

        {% if prediction_text %}
            <div class="result">
                Predicted Price: {{ prediction_text }}
            </div>
        {% endif %}

        {% if warning %}
            <div class="warning">
                {{ warning }}
            </div>
        {% endif %}

    </div>

</body>
</html>
